<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-container">
        <h3>🚀 داعم بلس Premium</h3>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label-group">
                    <div class="dot dot-new"></div>
                    <span>بلاغات جديدة (بالموقع)</span>
                </div>
                <div class="count" id="count-new">0</div>
            </div>

            <div class="stat-card">
                <div class="label-group">
                    <div class="dot dot-recent"></div>
                    <span>بانتظار المستفيد (اليوم)</span>
                </div>
                <div class="count" id="count-recent">0</div>
            </div>

            <div class="stat-card">
                <div class="label-group">
                    <div class="dot dot-old"></div>
                    <span>بلاغ قديم (أمس+)</span>
                </div>
                <div class="count" id="count-old">0</div>
            </div>

            <div class="stat-card">
                <div class="label-group">
                    <div class="dot dot-very-old"></div>
                    <span>قديم جداً / لدى الوزارة</span>
                </div>
                <div class="count" id="count-very-old">0</div>
            </div>

            <div class="stat-card">
                <div class="label-group">
                    <div class="dot dot-unassigned"></div>
                    <span>غير مسند للموظف</span>
                </div>
                <div class="count" id="count-unassigned">0</div>
            </div>
        </div>

        <div class="footer">تطوير ذكي - 2026</div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
